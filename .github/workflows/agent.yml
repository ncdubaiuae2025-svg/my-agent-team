name: DeepSeek Agent

on:
  workflow_dispatch:

jobs:
  call-deepseek:
    runs-on: ubuntu-latest
    steps:
      - name: Call DeepSeek via OpenRouter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "ERROR: OPENROUTER_API_KEY secret is not set."
            exit 1
          fi
          RESPONSE=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -d '{
              "model": "deepseek/deepseek-chat",
              "messages": [{"role": "user", "content": "قل مرحباً بالعربية واشرح بإيجاز كيف يمكنك مساعدة قبيلة أو عشيرة في إدارة منصة إلكترونية"}]
            }')
          echo "$RESPONSE" | jq -r '.choices[0].message.content' > response.txt
          cat response.txt
      - name: Upload response
        uses: actions/upload-artifact@v4
        with:
          name: deepseek-response
          path: response.txt
