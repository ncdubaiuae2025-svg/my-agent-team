name: DeepSeek Agent

on:
  workflow_dispatch:  # تشغيل يدوي فقط (للتجربة)

jobs:
  ask-deepseek:
    runs-on: ubuntu-latest
    steps:
      - name: Call DeepSeek API
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -d '{
              "model": "deepseek/deepseek-chat",
              "messages": [{"role": "user", "content": "قل مرحباً بالعربية واشرح بإيجاز كيف يمكنك مساعدة قبيلة أو عشيرة في إدارة منصة إلكترونية"}]
            }')
          echo "رد DeepSeek:" > response.txt
          echo "$RESPONSE" | jq -r '.choices[0].message.content' >> response.txt
          cat response.txt
      - name: Save response
        uses: actions/upload-artifact@v4
        with:
          name: deepseek-response
          path: response.txt
