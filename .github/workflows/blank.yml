name: Test OpenRouter Raw

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Call OpenRouter
        env:
          API_KEY: ${{ secrets.KEY_TEST_GMINE3 }}
        run: |
          curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_KEY" \
            -d '{"model":"google/gemini-3-flash","messages":[{"role":"user","content":"مرحبا"}]}' \
            -o response.json
          cat response.json
          echo "=== END ==="
      - name: Upload response
        uses: actions/upload-artifact@v4
        with:
          name: raw-response
          path: response.json
